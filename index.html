<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <title>Desempenho B3</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #10b981;
      --success-bg: #ecfdf5;
      --danger: #ef4444;
      --danger-bg: #fef2f2;
    }

    .dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #34d399;
      --success-bg: rgba(52, 211, 153, 0.1);
      --danger: #f87171;
      --danger-bg: rgba(248, 113, 113, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      padding: 24px 16px;
      max-width: 600px; /* Otimizado para visualização mobile confortável */
      margin: auto;
      transition: background 0.3s, color 0.3s;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .top-buttons {
      display: flex;
      gap: 8px;
    }

    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-main);
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    button:hover {
      background: var(--border);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
    }
    .btn-primary:hover {
      background: var(--primary-hover);
    }

    /* Cards de Métricas Extremamente Modernos */
    .kpi-container {
      margin-bottom: 24px;
    }

    .main-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      margin-bottom: 12px;
      text-align: center;
    }

    .main-card .label {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .main-card .value {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .grid-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .mini-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .mini-card .label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .mini-card .value {
      font-size: 1.15rem;
      font-weight: 600;
    }

    /* Filtros por Ano (Pills) */
    .filter-container {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .pill {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-muted);
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pill.active {
      background: var(--text-main);
      color: var(--card);
      border-color: var(--text-main);
    }

    /* Lista/Tabela Estilo Feed Moderno */
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-muted);
    }

    .list-wrapper {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .list-item:last-child {
      border-bottom: none;
    }

    .item-info .mes {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 2px;
    }

    .item-info .sub {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .badge {
      padding: 6px 12px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .badge.positivo {
      color: var(--success);
      background: var(--success-bg);
    }

    .badge.negativo {
      color: var(--danger);
      background: var(--danger-bg);
    }

    @media (max-width: 480px) {
      body {
        padding: 16px 12px;
      }
      .main-card .value {
        font-size: 1.9rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Bolsa de Valores</h1>
    <div class="top-buttons">
      <button id="themeBtn">🌙</button>
      <button id="exportBtn" class="btn-primary">💾 Exportar</button>
    </div>
  </header>

  <div class="kpi-container">
    <div class="main-card">
      <div class="label">Saldo Total Acumulado</div>
      <div class="value" id="saldoTotal">R$ 0,00</div>
    </div>
    
    <div class="grid-stats">
      <div class="mini-card">
        <div class="label">Média Mensal</div>
        <div class="value" id="mediaMensal">R$ 0,00</div>
      </div>
      <div class="mini-card">
        <div class="label">Meses Positivos</div>
        <div class="value" id="taxaAcerto">0%</div>
      </div>
    </div>
  </div>

  <div class="section-title">Histórico de Desempenho</div>

  <div class="filter-container">
    <div class="pill active" onclick="mudarAno('2025')" id="pill2025">2025</div>
    <div class="pill" onclick="mudarAno('2026')" id="pill2026">2026</div>
  </div>

  <div class="list-wrapper" id="historicoLista">
    </div>

  <script>
    let dadosGlobais = {};
    let anoAtual = '2025';

    // Formatação de Moeda Brasileira
    function formatarMoeda(valor) {
      return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    // Altera o ano de exibição
    function mudarAno(ano) {
      anoAtual = ano;
      document.getElementById('pill2025').classList.toggle('active', ano === '2025');
      document.getElementById('pill2026').classList.toggle('active', ano === '2026');
      render();
    }

    function render() {
      const listaContainer = document.getElementById('historicoLista');
      listaContainer.innerHTML = '';

      const mesesDoAno = dadosGlobais[anoAtual] || [];

      if (mesesDoAno.length === 0) {
        listaContainer.innerHTML = `<div class="list-item" style="color:var(--text-muted)">Nenhum dado registrado para este ano.</div>`;
        return;
      }

      mesesDoAno.forEach(item => {
        const ehPositivo = item.valor >= 0;
        const sinal = ehPositivo ? '▲ ' : '▼ ';
        const classeBadge = ehPositivo ? 'positivo' : 'negativo';

        listaContainer.innerHTML += `
          <div class="list-item">
            <div class="item-info">
              <div class="mes">${item.mes}</div>
              <div class="sub">Fechamento mensal • ${anoAtual}</div>
            </div>
            <div class="badge ${classeBadge}">
              <span>${sinal}</span> ${formatarMoeda(item.valor)}
            </div>
          </div>
        `;
      });
    }

    function calcularMetricasGerais() {
      let totalAcumulado = 0;
      let qtdMeses = 0;
      let mesesPositivos = 0;

      // Percorre todos os anos do arquivo dinamicamente
      Object.keys(dadosGlobais).forEach(ano => {
        dadosGlobais[ano].forEach(item => {
          totalAcumulado += item.valor;
          qtdMeses++;
          if (item.valor > 0) mesesPositivos++;
        });
      });

      const media = qtdMeses > 0 ? (totalAcumulado / qtdMeses) : 0;
      const pctAcertos = qtdMeses > 0 ? Math.round((mesesPositivos / qtdMeses) * 100) : 0;

      // Atualiza os elementos na tela
      const elSaldo = document.getElementById('saldoTotal');
      elSaldo.textContent = formatarMoeda(totalAcumulado);
      // Muda a cor do card principal dependendo do resultado geral total
      elSaldo.style.color = totalAcumulado >= 0 ? 'var(--success)' : 'var(--danger)';

      document.getElementById('mediaMensal').textContent = formatarMoeda(media);
      document.getElementById('taxaAcerto').textContent = `${pctAcertos}% (${mesesPositivos}/${qtdMeses} M)`;
    }

    // Exportação do JSON original
    document.getElementById('exportBtn').onclick = () => {
      const blob = new Blob([JSON.stringify(dadosGlobais, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'dados.json';
      a.click();
    };

    // Controle de Tema (Dark/Light) inteligente
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.body.classList.add('dark');
      document.getElementById('themeBtn').textContent = '☀️';
    } else {
      document.getElementById('themeBtn').textContent = '🌙';
    }

    document.getElementById('themeBtn').onclick = () => {
      document.body.classList.toggle('dark');
      const ehDark = document.body.classList.contains('dark');
      document.getElementById('themeBtn').textContent = ehDark ? '☀️' : '🌙';
      localStorage.setItem('theme', ehDark ? 'dark' : 'light');
    };

    // Carregamento dos dados locais/remotos
    async function carregarDados() {
      try {
        const response = await fetch('./dados.json?v=' + Date.now());
        if (!response.ok) throw new Error('Erro ao carregar o arquivo JSON.');
        
        dadosGlobais = await response.json();
        calcularMetricasGerais();
        render();
      } catch (err) {
        console.error(err);
        // Fallback visual em caso de erro de leitura
        document.getElementById('historicoLista').innerHTML = `<div class="list-item" style="color:var(--danger)">Erro ao ler dados.json. Certifique-se de que o arquivo existe e está no formato correto.</div>`;
      }
    }

    carregarDados();
  </script>
</body>
</html>
